<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="EduCoin — ta'lim mukofot tizimi">
  <meta name="theme-color" content="#050A05">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <title>EduCoin — Reyting</title>
  <link rel="stylesheet" href="../../css/style.css">
  <link rel="stylesheet" href="../../css/dashboard.css">
</head>
<body>
  <div class="app-layout">
    <div id="sidebar-container"></div>
    <div class="main-content">
      <header class="topbar">
        <div style="display:flex;align-items:center;gap:12px">
          <button class="hamburger" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
          <div class="topbar-title">🏆 Reyting</div>
        </div>
        <div class="topbar-right"><div class="coin-display" id="topCoinDisplay">🪙 0</div></div>
      </header>
      <div class="page-content">
        <div class="page-header"><div><h1>🏆 O'quvchilar reytingi</h1><p>Coin miqdori bo'yicha tartib</p></div></div>
        <div class="card">
          <div id="leaderboard"></div>
        </div>
      </div>
    </div>
  </div>
  <script src="../../js/auth.js"></script>
  <script src="../../js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await EduCoin.init();
      const user = EduCoin.requireAuth(['teacher','manager','director','admin']);
      if (!user) return;
      document.getElementById('sidebar-container').innerHTML = buildSidebar(user.role, user);
      document.getElementById('topCoinDisplay').textContent = `🪙 ${(user.coins||0).toLocaleString()}`;
      const lb = EduCoin.getLeaderboard();
      const groups = EduCoin.getGroups();
      const emojis = ['🥇','🥈','🥉'];
      document.getElementById('leaderboard').innerHTML = lb.length ? lb.map((u,i)=>{
        const g = groups.find(gr=>gr.studentIds.includes(u.id));
        return `<div class="leaderboard-item">
          <div class="rank-num ${i<3?'rank-'+(i+1):'rank-other'}">${i<3?emojis[i]:i+1}</div>
          <div class="leader-avatar">${getInitials(u.name)}</div>
          <div class="leader-info"><div class="leader-name">${u.name}</div><div class="leader-group">${g?g.name:'—'}</div></div>
          <div class="leader-coins">${(u.coins||0).toLocaleString()} 🪙</div>
        </div>`;
      }).join('') : '<div class="empty-state"><div class="icon">🏅</div><p>O\'quvchilar yo\'q</p></div>';
    });
  </script>
</body>
</html>

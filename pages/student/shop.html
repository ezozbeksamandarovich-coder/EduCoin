<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="EduCoin do'koni">
  <meta name="theme-color" content="#050A05">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <title>EduCoin - Do'kon</title>
  <link rel="stylesheet" href="../../css/style.css">
  <link rel="stylesheet" href="../../css/dashboard.css">
</head>
<body class="blur-on">
  <div class="app-layout">
    <div id="sidebar-container"></div>
    <div class="main-content">
      <header class="topbar">
        <div class="topbar-left">
          <button class="hamburger" aria-label="Menyu">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="3" y1="12" x2="21" y2="12"></line>
              <line x1="3" y1="6" x2="21" y2="6"></line>
              <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
          </button>
          <div>
            <div class="topbar-title" id="pageTopbarTitle">Do'kon</div>
            <div class="market-topbar-subtitle" id="pageTopbarSubtitle">Mahsulotlar yuklanmoqda</div>
          </div>
        </div>
        <div class="topbar-right">
          <div class="coin-display" id="topCoinDisplay">0 coin</div>
        </div>
      </header>

      <div class="page-content">
        <section class="market-hero">
          <div>
            <div class="market-kicker">Marketplace</div>
            <h1 id="marketHeroTitle">EduCoin do'koni</h1>
            <p id="marketHeroSubtitle">Coinlaringizni foydali mahsulotlarga almashtiring.</p>
          </div>
          <div class="market-hero-actions">
            <div class="market-balance-chip">
              <span class="label">Balans</span>
              <strong id="heroCoinBalance">0 coin</strong>
            </div>
          </div>
        </section>

        <section class="market-stats" id="marketStats"></section>

        <section class="card">
          <div class="market-toolbar">
            <div class="search-bar">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="7"></circle>
                <line x1="20" y1="20" x2="16.65" y2="16.65"></line>
              </svg>
              <input type="text" id="shopSearchInput" placeholder="Mahsulot, kategoriya yoki tavsif bo'yicha qidiring...">
            </div>
            <select class="form-control" id="shopCategoryFilter"></select>
            <select class="form-control" id="shopAvailabilityFilter">
              <option value="">Barcha mahsulotlar</option>
              <option value="affordable">Faqat mos keladiganlar</option>
              <option value="low-stock">Kam qolganlar</option>
              <option value="premium">Premium mahsulotlar</option>
            </select>
            <select class="form-control" id="shopSortFilter">
              <option value="recommended">Tavsiya etilgan</option>
              <option value="price-asc">Narxi arzonidan</option>
              <option value="price-desc">Narxi qimmatidan</option>
              <option value="stock-desc">Stock bo'yicha</option>
              <option value="name-asc">Nom bo'yicha A-Z</option>
            </select>
          </div>
          <div class="card-toolbar market-toolbar-meta">
            <div class="users-section-desc" id="marketFilterHint">Barcha mahsulotlar ko'rsatilmoqda</div>
            <span class="badge badge-primary" id="marketResultCount">0 ta natija</span>
          </div>
        </section>

        <section class="market-grid" id="shopGrid"></section>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="buyModal">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">Xaridni tasdiqlash</div>
        <button class="modal-close" type="button" onclick="closeModal('buyModal')">x</button>
      </div>
      <div class="modal-body">
        <div class="buy-item-info">
          <div id="buyItemVisual" class="buy-item-icon"></div>
          <h3 id="buyItemName" class="buy-item-name"></h3>
          <p id="buyItemDesc" class="buy-item-desc"></p>
          <div class="buy-price-info">
            <div class="price-item">
              <div class="price-label">Narx</div>
              <div class="price-value" id="buyItemPrice"></div>
            </div>
            <div class="price-item">
              <div class="price-label">Balansingiz</div>
              <div class="price-value balance-color" id="buyUserBalance"></div>
            </div>
            <div class="price-item">
              <div class="price-label">Kategoriya</div>
              <div class="price-value" id="buyItemCategory"></div>
            </div>
            <div class="price-item">
              <div class="price-label">Stock</div>
              <div class="price-value" id="buyItemStock"></div>
            </div>
          </div>
          <div id="buyAfterBalance" class="after-balance"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" type="button" onclick="closeModal('buyModal')">Bekor</button>
        <button class="btn btn-primary" type="button" id="confirmBuyBtn">Sotib olish</button>
      </div>
    </div>
  </div>

  <script src="../../js/auth.js"></script>
  <script src="../../js/main.js"></script>
  <script src="../../js/shop-catalog-page.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      initShopCatalogPage({
        allowedRoles: ['student'],
        topbarTitle: "Do'kon",
        heroTitle: "EduCoin do'koni",
        heroSubtitle: "Coin yig'ing va ularni foydali sovg'alar, bonuslar va mahsulotlarga almashtiring.",
      });
    });
  </script>
</body>
</html>

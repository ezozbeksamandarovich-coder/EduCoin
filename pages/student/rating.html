<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="EduCoin — ta'lim mukofot tizimi">
  <meta name="theme-color" content="#050A05">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <title>EduCoin — Reyting</title>
  <link rel="stylesheet" href="../../css/style.css">
  <link rel="stylesheet" href="../../css/dashboard.css">
</head>
<body>
  <div class="app-layout">
    <div id="sidebar-container"></div>
    <div class="main-content">
      <header class="topbar">
        <div style="display:flex;align-items:center;gap:12px">
          <button class="hamburger" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
          <div class="topbar-title">🏆 Reyting</div>
        </div>
        <div class="topbar-right">
          <div class="coin-display" id="topCoinDisplay">🪙 0</div>
        </div>
      </header>
      <div class="page-content">
        <div class="page-header">
          <div><h1>🏆 Reyting jadvali</h1><p>EduCoin miqdori bo'yicha top o'quvchilar</p></div>
        </div>

        <!-- My rank -->
        <div class="card" id="myRankCard" style="margin-bottom:20px;background:linear-gradient(135deg,rgba(0,255,136,0.15),rgba(255,101,132,0.1));border-color:rgba(0,255,136,0.3)">
          <div style="display:flex;align-items:center;gap:16px">
            <div style="font-size:36px" id="myRankEmoji">🏅</div>
            <div>
              <div style="font-size:13px;color:var(--text3)">SIZNING REYTINGIZ</div>
              <div style="font-size:28px;font-weight:800" id="myRankText">#-</div>
            </div>
            <div style="margin-left:auto;text-align:right">
              <div style="font-size:13px;color:var(--text3)">BALANSINGIZ</div>
              <div style="font-size:24px;font-weight:800;color:var(--coin);font-family:'Space Mono',monospace" id="myRankCoins">0 🪙</div>
            </div>
          </div>
        </div>

        <div class="card">
          <h3 style="margin-bottom:16px">Barcha o'quvchilar reytingi</h3>
          <div id="fullLeaderboard"></div>
        </div>
      </div>
    </div>
  </div>
  <script src="../../js/auth.js"></script>
  <script src="../../js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await EduCoin.init();
      const user = EduCoin.requireAuth(['student']);
      if (!user) return;
      document.getElementById('sidebar-container').innerHTML = buildSidebar('student', user);
      document.getElementById('topCoinDisplay').textContent = `🪙 ${user.coins.toLocaleString()}`;

      const lb = EduCoin.getLeaderboard();
      const rank = lb.findIndex(u => u.id === user.id) + 1;
      const emojis = ['🥇','🥈','🥉'];
      document.getElementById('myRankEmoji').textContent = rank <= 3 ? emojis[rank-1] : (rank <= 10 ? '🏅' : '📊');
      document.getElementById('myRankText').textContent = rank ? `#${rank} o'rin` : 'Reyting yo\'q';
      document.getElementById('myRankCoins').textContent = `${user.coins.toLocaleString()} 🪙`;

      const el = document.getElementById('fullLeaderboard');
      const groups = EduCoin.getGroups();
      el.innerHTML = lb.map((u, i) => {
        const group = groups.find(g => g.studentIds.includes(u.id));
        const isMe = u.id === user.id;
        return `<div class="leaderboard-item" style="${isMe ? 'background:rgba(0,255,136,0.1);border-radius:10px;' : ''}">
          <div class="rank-num ${i < 3 ? 'rank-'+(i+1) : 'rank-other'}">${i < 3 ? emojis[i] : i+1}</div>
          <div class="leader-avatar" style="${isMe ? 'border:2px solid var(--primary)' : ''}">${getInitials(u.name)}</div>
          <div class="leader-info">
            <div class="leader-name">${u.name} ${isMe ? '<span class="badge badge-primary">Siz</span>' : ''}</div>
            <div class="leader-group">${group ? group.name : '—'}</div>
          </div>
          <div class="leader-coins">${(u.coins||0).toLocaleString()} 🪙</div>
        </div>`;
      }).join('');
    });
  </script>
</body>
</html>

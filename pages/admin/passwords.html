<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="EduCoin ta'lim mukofot tizimi">
  <meta name="theme-color" content="#050A05">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <title>EduCoin - Login va parollar</title>
  <link rel="stylesheet" href="../../css/style.css">
  <link rel="stylesheet" href="../../css/dashboard.css">
</head>
<body>
  <div class="app-layout">
    <div id="sidebar-container"></div>
    <div class="main-content">
      <header class="topbar">
        <div class="topbar-left">
          <button class="hamburger" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
          <div class="topbar-title">Login va parollar</div>
        </div>
        <div class="topbar-right">
          <span class="badge badge-danger">ADMIN</span>
        </div>
      </header>

      <div class="page-content">
        <div class="page-header">
          <div>
            <h1>Login va parollar</h1>
            <p>Barcha foydalanuvchilarning kirish ma'lumotlari</p>
          </div>
        </div>

        <div class="alert alert-warning">
          Bu sahifa maxfiy. Parollarni faqat admin ko'rishi kerak.
        </div>

        <div class="card">
          <div class="card-toolbar">
            <h3 class="card-title">Kirish ma'lumotlari</h3>
            <span class="badge badge-primary record-badge" id="passwordCount">0 ta yozuv</span>
          </div>

          <div class="search-filter-row">
            <div class="search-bar">
              <span>Qidiruv</span>
              <input type="text" id="searchInput" placeholder="Ism yoki username..." oninput="filterUsers()">
            </div>
            <select class="form-control role-filter" id="roleFilter" onchange="filterUsers()">
              <option value="">Barcha rollar</option>
              <option value="student">O'quvchi</option>
              <option value="teacher">O'qituvchi</option>
              <option value="manager">Menejer</option>
              <option value="director">Direktor</option>
              <option value="admin">Admin</option>
            </select>
          </div>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>#</th>
                  <th>Ism</th>
                  <th>Rol</th>
                  <th>Username</th>
                  <th>Parol</th>
                  <th>Amal</th>
                </tr>
              </thead>
              <tbody id="pwdTable"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="resetModal">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">Parol o'zgartirish</div>
        <button class="modal-close" onclick="closeModal('resetModal')">x</button>
      </div>
      <div class="modal-body">
        <div id="resetAlert"></div>
        <div class="modal-target-card">
          <div class="modal-target-label">Foydalanuvchi</div>
          <div class="modal-target-value" id="resetTargetName"></div>
        </div>
        <div class="form-group">
          <label class="form-label">Yangi parol</label>
          <input type="text" class="form-control" id="newPwd" placeholder="Yangi parol">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('resetModal')">Bekor</button>
        <button class="btn btn-primary" onclick="resetPassword()">O'zgartirish</button>
      </div>
    </div>
  </div>

  <script src="../../js/auth.js?v=20260413k"></script>
  <script src="../../js/main.js?v=20260413k"></script>
  <script>
    let allUsers = [];
    let selectedUserId = null;
    const roleLabels = {
      student: "O'quvchi",
      teacher: "O'qituvchi",
      manager: 'Menejer',
      director: 'Direktor',
      admin: 'Admin',
    };

    document.addEventListener('DOMContentLoaded', async () => {
      await EduCoin.init();
      const user = EduCoin.requireAuth(['admin']);
      if (!user) return;
      document.getElementById('sidebar-container').innerHTML = buildSidebar('admin', user);
      allUsers = EduCoin.getUsers();
      renderTable(allUsers);
    });

    function filterUsers() {
      const query = document.getElementById('searchInput').value.toLowerCase();
      const role = document.getElementById('roleFilter').value;
      let filtered = allUsers;

      if (query) {
        filtered = filtered.filter((user) =>
          user.name.toLowerCase().includes(query) || user.username.toLowerCase().includes(query)
        );
      }

      if (role) {
        filtered = filtered.filter((user) => user.role === role);
      }

      renderTable(filtered);
    }

    function renderTable(users) {
      document.getElementById('passwordCount').textContent = `${users.length} ta yozuv`;
      document.getElementById('pwdTable').innerHTML = users.map((user, index) => `
        <tr>
          <td class="table-index">${index + 1}</td>
          <td class="cell-strong">${user.name}</td>
          <td><span class="badge role-badge" data-role="${user.role}">${roleLabels[user.role]}</span></td>
          <td><span class="code-pill">${user.username}</span></td>
          <td><span class="code-pill code-pill--password">${user.password}</span></td>
          <td><button class="btn btn-warning btn-sm" onclick="openReset('${user.id}', '${user.name.replace(/'/g, "\\'")}')">O'zgartir</button></td>
        </tr>
      `).join('');
    }

    function openReset(id, name) {
      selectedUserId = id;
      document.getElementById('resetTargetName').textContent = name;
      document.getElementById('newPwd').value = '';
      document.getElementById('resetAlert').innerHTML = '';
      openModal('resetModal');
    }

    function resetPassword() {
      const password = document.getElementById('newPwd').value;
      const alertHost = document.getElementById('resetAlert');

      if (password.length < 4) {
        alertHost.innerHTML = '<div class="alert alert-danger">Parol kamida 4 ta belgi bo\'lishi kerak!</div>';
        return;
      }

      EduCoin.updateUser(selectedUserId, { password });
      allUsers = EduCoin.getUsers();
      filterUsers();
      closeModal('resetModal');
      showToast('Parol muvaffaqiyatli o\'zgartirildi!', 'success');
    }
  </script>
</body>
</html>

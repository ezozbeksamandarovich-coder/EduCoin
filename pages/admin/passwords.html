<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="EduCoin — ta'lim mukofot tizimi">
  <meta name="theme-color" content="#050A05">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <title>EduCoin — Login & Parollar</title>
  <link rel="stylesheet" href="../../css/style.css">
  <link rel="stylesheet" href="../../css/dashboard.css">
</head>
<body>
  <div class="app-layout">
    <div id="sidebar-container"></div>
    <div class="main-content">
      <header class="topbar">
        <div style="display:flex;align-items:center;gap:12px">
          <button class="hamburger" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
          <div class="topbar-title">🔑 Login & Parollar</div>
        </div>
        <div class="topbar-right"><span class="badge badge-danger">ADMIN</span></div>
      </header>
      <div class="page-content">
        <div class="page-header">
          <div><h1>🔑 Login va parollar</h1><p>Barcha foydalanuvchilarning kirish ma'lumotlari</p></div>
        </div>

        <div class="alert alert-warning" style="margin-bottom:20px">
          ⚠️ Bu sahifa maxfiy. Parollarni hech kimga bermang!
        </div>

        <div style="display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap">
          <div class="search-bar" style="flex:1;margin:0">
            <span>🔍</span>
            <input type="text" id="searchInput" placeholder="Ism yoki username..." oninput="filterUsers()">
          </div>
          <select class="form-control" id="roleFilter" style="width:160px" onchange="filterUsers()">
            <option value="">Barcha rollar</option>
            <option value="student">O'quvchi</option>
            <option value="teacher">O'qituvchi</option>
            <option value="manager">Menejer</option>
            <option value="director">Direktor</option>
            <option value="admin">Admin</option>
          </select>
        </div>

        <div class="table-wrap">
          <table>
            <thead><tr><th>#</th><th>Ism</th><th>Rol</th><th>Username</th><th>Parol</th><th>Amal</th></tr></thead>
            <tbody id="pwdTable"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- Reset Password Modal -->
  <div class="modal-overlay" id="resetModal">
    <div class="modal">
      <div class="modal-header"><div class="modal-title">🔑 Parol o'zgartirish</div><button class="modal-close" onclick="closeModal('resetModal')">×</button></div>
      <div class="modal-body">
        <div id="resetAlert"></div>
        <div style="margin-bottom:14px;padding:12px;background:var(--bg3);border-radius:10px">
          <div style="font-size:12px;color:var(--text3)">Foydalanuvchi</div>
          <div style="font-size:16px;font-weight:700" id="resetTargetName"></div>
        </div>
        <div class="form-group"><label class="form-label">Yangi parol</label><input type="text" class="form-control" id="newPwd" placeholder="Yangi parol"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('resetModal')">Bekor</button>
        <button class="btn btn-primary" onclick="resetPassword()">✅ O'zgartirish</button>
      </div>
    </div>
  </div>

  <script src="../../js/auth.js"></script>
  <script src="../../js/main.js"></script>
  <script>
    let allUsers = [], selectedUserId;
    const roleLabels={student:"O'quvchi",teacher:"O'qituvchi",manager:"Menejer",director:"Direktor",admin:"Admin"};
    const roleColors={student:'#4CAF50',teacher:'#2196F3',manager:'#FF9800',director:'#9C27B0',admin:'#F44336'};

    document.addEventListener('DOMContentLoaded', async () => {
      await EduCoin.init();
      const user = EduCoin.requireAuth(['admin']);
      if (!user) return;
      document.getElementById('sidebar-container').innerHTML = buildSidebar('admin', user);
      allUsers = EduCoin.getUsers();
      renderTable(allUsers);
    });

    function filterUsers() {
      const q = document.getElementById('searchInput').value.toLowerCase();
      const role = document.getElementById('roleFilter').value;
      let f = allUsers;
      if (q) f = f.filter(u=>u.name.toLowerCase().includes(q)||u.username.toLowerCase().includes(q));
      if (role) f = f.filter(u=>u.role===role);
      renderTable(f);
    }

    function renderTable(users) {
      document.getElementById('pwdTable').innerHTML = users.map((u,i) => `<tr>
        <td style="color:var(--text3)">${i+1}</td>
        <td style="font-weight:600">${u.name}</td>
        <td><span class="badge" style="background:${roleColors[u.role]}22;color:${roleColors[u.role]}">${roleLabels[u.role]}</span></td>
        <td><code style="background:var(--bg3);padding:4px 8px;border-radius:6px;font-size:13px">${u.username}</code></td>
        <td><code style="background:rgba(255,215,0,0.08);padding:4px 8px;border-radius:6px;font-size:13px;color:var(--coin)">${u.password}</code></td>
        <td><button class="btn btn-warning btn-sm" onclick="openReset('${u.id}','${u.name}')">🔑 O'zgartir</button></td>
      </tr>`).join('');
    }

    function openReset(id, name) {
      selectedUserId = id;
      document.getElementById('resetTargetName').textContent = name;
      document.getElementById('newPwd').value = '';
      document.getElementById('resetAlert').innerHTML = '';
      openModal('resetModal');
    }

    function resetPassword() {
      const pwd = document.getElementById('newPwd').value;
      const el = document.getElementById('resetAlert');
      if (pwd.length < 4) { el.innerHTML='<div class="alert alert-danger">Parol kamida 4 ta belgi!</div>'; return; }
      EduCoin.updateUser(selectedUserId, { password: pwd });
      allUsers = EduCoin.getUsers();
      filterUsers();
      closeModal('resetModal');
      showToast('Parol muvaffaqiyatli o\'zgartirildi!', 'success');
    }
  </script>
</body>
</html>

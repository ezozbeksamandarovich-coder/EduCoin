<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="EduCoin ta'lim mukofot tizimi">
  <meta name="theme-color" content="#050A05">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <title>EduCoin - Database</title>
  <link rel="stylesheet" href="../../css/style.css">
  <link rel="stylesheet" href="../../css/dashboard.css">
</head>
<body>
  <div class="app-layout">
    <div id="sidebar-container"></div>
    <div class="main-content">
      <header class="topbar">
        <div class="topbar-left">
          <button class="hamburger" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
          <div class="topbar-title">Database</div>
        </div>
        <div class="topbar-right">
          <span class="badge badge-danger">ADMIN</span>
        </div>
      </header>

      <div class="page-content">
        <div class="page-header">
          <div>
            <h1 data-translate="database.title">Database Management</h1>
            <p data-translate="database.subtitle">Manage all system data</p>
          </div>
          <div class="page-actions">
            <button class="btn btn-primary" onclick="exportData()">Export</button>
            <button class="btn btn-info" onclick="importData()">Import</button>
            <button class="btn btn-warning" onclick="optimizeDatabase()">Optimize</button>
            <button class="btn btn-danger" onclick="resetDatabase()">Reset</button>
          </div>
        </div>

        <div class="stat-grid-auto" id="dbStats"></div>

        <div class="alert alert-info">
          <span data-translate="database.info">Barcha ma'lumotlar brauzerning LocalStorage'ida saqlanmoqda. Export qilib JSON fayl sifatida saqlash mumkin.</span>
        </div>

        <div class="tabs">
          <button class="tab-btn active" onclick="showTab('users', this)">Users</button>
          <button class="tab-btn" onclick="showTab('coins', this)">Coins</button>
          <button class="tab-btn" onclick="showTab('shop', this)">Shop</button>
          <button class="tab-btn" onclick="showTab('groups', this)">Groups</button>
          <button class="tab-btn" onclick="showTab('purchases', this)">Purchases</button>
        </div>

        <div class="card">
          <div class="card-toolbar">
            <h3 class="card-title" id="tableTitle">Users</h3>
            <div class="card-toolbar-right">
              <div class="search-box">
                <input type="text" id="searchInput" placeholder="Qidirish..." onkeyup="filterData()">
              </div>
              <span class="badge badge-primary record-badge" id="recordCount">0 ta yozuv</span>
            </div>
          </div>
          <div id="tableContainer"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="../../js/translations.js?v=20260413f"></script>
  <script src="../../js/auth.js?v=20260413f"></script>
  <script src="../../js/main.js?v=20260413f"></script>
  <script>
    let currentTab = 'users';
    let currentLang = 'uz';
    let allData = {};
    const TABLES = ['users', 'coins', 'shop', 'groups', 'purchases', 'reports'];

    document.addEventListener('DOMContentLoaded', async () => {
      await EduCoin.init();
      const user = EduCoin.requireAuth(['admin']);
      if (!user) return;

      const langSettings = EduCoin.getData('langSettings') || {};
      currentLang = langSettings.language || 'uz';
      applyTranslations(currentLang);

      document.getElementById('sidebar-container').innerHTML = buildSidebar('admin', user);
      updateDbStats();
      showTab('users', document.querySelector('.tab-btn'));
    });

    function showTab(tab, btn) {
      currentTab = tab;
      document.querySelectorAll('.tab-btn').forEach((button) => button.classList.remove('active'));
      btn.classList.add('active');

      const data = (EduCoin.getData(tab) || []).slice();
      allData[tab] = data;
      document.getElementById('recordCount').textContent = `${data.length} ta yozuv`;

      const labels = {
        users: 'Users',
        coins: 'Coins',
        shop: 'Shop',
        groups: 'Groups',
        purchases: 'Purchases',
      };
      document.getElementById('tableTitle').textContent = labels[tab] || tab;

      if (!data.length) {
        document.getElementById('tableContainer').innerHTML =
          '<div class="empty-state"><div class="icon">?</div><p>Ma\'lumot yo\'q</p></div>';
        return;
      }

      renderTable(data);
    }

    function renderTable(data) {
      const keys = Object.keys(data[0]);
      document.getElementById('tableContainer').innerHTML = `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>${keys.map((key) => `<th>${key}</th>`).join('')}</tr>
            </thead>
            <tbody>
              ${data.map((row) => `
                <tr>
                  ${keys.map((key) => {
                    const value = row[key];
                    const text = typeof value === 'object' ? JSON.stringify(value) : String(value ?? '-');
                    return `<td class="cell-truncate" title="${text}">${text}</td>`;
                  }).join('')}
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `;
    }

    function filterData() {
      const searchTerm = document.getElementById('searchInput').value.toLowerCase();
      const data = allData[currentTab] || [];

      if (!searchTerm) {
        document.getElementById('recordCount').textContent = `${data.length} ta yozuv`;
        renderTable(data);
        return;
      }

      const filtered = data.filter((row) => {
        return Object.values(row).some((value) => {
          const text = typeof value === 'object' ? JSON.stringify(value) : String(value ?? '');
          return text.toLowerCase().includes(searchTerm);
        });
      });

      document.getElementById('recordCount').textContent = `${filtered.length} ta yozuv`;
      renderTable(filtered);
    }

    function updateDbStats() {
      const icons = {
        users: 'U',
        coins: 'C',
        shop: 'S',
        groups: 'G',
        purchases: 'P',
        reports: 'R',
      };

      const statsHtml = TABLES.map((table) => {
        const data = EduCoin.getData(table) || [];
        const size = JSON.stringify(data).length;
        return `
          <div class="stat-card stat-card-centered">
            <div class="stat-emoji">${icons[table]}</div>
            <div class="stat-info">
              <div class="label">${table.charAt(0).toUpperCase() + table.slice(1)}</div>
              <div class="value">${data.length} ta</div>
              <div class="stat-footnote">${(size / 1024).toFixed(1)} KB</div>
            </div>
          </div>
        `;
      }).join('');

      document.getElementById('dbStats').innerHTML = statsHtml;
    }

    function exportData() {
      const all = {};
      TABLES.forEach((key) => {
        all[key] = EduCoin.getData(key) || [];
      });

      const blob = new Blob([JSON.stringify(all, null, 2)], { type: 'application/json' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = `educoin_backup_${new Date().toISOString().split('T')[0]}.json`;
      link.click();
      showToast('Ma\'lumotlar export qilindi!', 'success');
    }

    function importData() {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = '.json';
      input.onchange = (event) => {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (readerEvent) => {
          try {
            const data = JSON.parse(readerEvent.target.result);
            TABLES.forEach((key) => {
              EduCoin.setData(key, Array.isArray(data[key]) ? data[key] : []);
            });
            showToast('JSON import qilindi.', 'success');
            updateDbStats();
            showTab(currentTab, document.querySelector('.tab-btn.active'));
          } catch {
            showToast('JSON faylini o\'qishda xatolik yuz berdi!', 'error');
          }
        };
        reader.readAsText(file);
      };
      input.click();
    }

    function optimizeDatabase() {
      if (!confirm('Database optimallashtirilsinmi? Bu jarayon bekor qilib bo\'lmaydi!')) return;

      TABLES.forEach((table) => {
        const data = EduCoin.getData(table) || [];
        const cleaned = data.filter((item, index, list) => {
          if (!item || !item.id) return true;
          return index === list.findIndex((candidate) => candidate && candidate.id === item.id);
        });
        EduCoin.setData(table, cleaned);
      });

      showToast('Database optimallashtirildi!', 'success');
      updateDbStats();
      showTab(currentTab, document.querySelector('.tab-btn.active'));
    }

    function resetDatabase() {
      if (!confirm('Barcha ma\'lumotlar o\'chiriladi. Tasdiqlaysizmi?')) return;
      if (!confirm('Haqiqatan ham ishonchingiz komilmi?')) return;

      ['users', 'coins', 'shop', 'groups', 'purchases', 'reports', 'initialized'].forEach((key) => {
        localStorage.removeItem(`educoin_${key}`);
      });
      showToast('Database tozalandi! Sahifa yangilanmoqda...', 'info');
      setTimeout(() => {
        window.location.href = '../../index.html';
      }, 2000);
    }
  </script>
</body>
</html>

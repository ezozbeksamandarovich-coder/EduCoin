<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="EduCoin do'kon boshqaruvi">
  <meta name="theme-color" content="#050A05">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <title>EduCoin - Do'kon boshqaruvi</title>
  <link rel="stylesheet" href="../../css/style.css">
  <link rel="stylesheet" href="../../css/dashboard.css">
</head>
<body class="blur-on">
  <div class="app-layout">
    <div id="sidebar-container"></div>
    <div class="main-content">
      <header class="topbar">
        <div class="topbar-left">
          <button class="hamburger" aria-label="Menyu">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="3" y1="12" x2="21" y2="12"></line>
              <line x1="3" y1="6" x2="21" y2="6"></line>
              <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
          </button>
          <div>
            <div class="topbar-title" id="pageTopbarTitle">Do'kon boshqaruvi</div>
            <div class="market-topbar-subtitle" id="pageTopbarSubtitle">Do'kon ma'lumotlari yuklanmoqda</div>
          </div>
        </div>
        <div class="topbar-right">
          <div class="coin-display" id="topCoinDisplay">0 coin</div>
        </div>
      </header>

      <div class="page-content">
        <section class="market-hero">
          <div>
            <div class="market-kicker">Shop Control</div>
            <h1 id="marketHeroTitle">Do'konni boshqarish</h1>
            <p id="marketHeroSubtitle">Mahsulot qo'shish, tahrirlash, faollik va stock holatini bir joydan boshqaring.</p>
          </div>
          <div class="market-hero-actions">
            <div class="market-balance-chip">
              <span class="label">Sizning balans</span>
              <strong id="heroCoinBalance">0 coin</strong>
            </div>
            <button class="btn btn-primary" type="button" id="openItemModalBtn">Yangi mahsulot</button>
          </div>
        </section>

        <section class="market-stats" id="marketStats"></section>

        <section class="card">
          <div class="market-toolbar">
            <div class="search-bar">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="7"></circle>
                <line x1="20" y1="20" x2="16.65" y2="16.65"></line>
              </svg>
              <input type="text" id="shopSearchInput" placeholder="Mahsulot, kategoriya yoki tavsif bo'yicha qidiring...">
            </div>
            <select class="form-control" id="shopCategoryFilter"></select>
            <select class="form-control" id="shopStatusFilter">
              <option value="">Barcha holatlar</option>
              <option value="active">Faqat faol</option>
              <option value="inactive">Faqat nofaol</option>
              <option value="low-stock">Kam stock</option>
            </select>
            <select class="form-control" id="shopSortFilter">
              <option value="newest">Eng yangi</option>
              <option value="price-asc">Narxi arzonidan</option>
              <option value="price-desc">Narxi qimmatidan</option>
              <option value="stock-asc">Stock kamidan</option>
              <option value="stock-desc">Stock ko'pidan</option>
              <option value="name-asc">Nom bo'yicha A-Z</option>
            </select>
          </div>
          <div class="card-toolbar market-toolbar-meta">
            <div class="users-section-desc" id="marketFilterHint">Barcha mahsulotlar ko'rsatilmoqda</div>
            <span class="badge badge-primary" id="marketResultCount">0 ta natija</span>
          </div>
        </section>

        <section class="market-grid" id="shopGrid"></section>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="itemModal">
    <div class="modal users-modal">
      <div class="modal-header">
        <div class="modal-title" id="itemModalTitle">Yangi mahsulot</div>
        <button class="modal-close" type="button" id="closeItemModalBtn">x</button>
      </div>
      <div class="modal-body">
        <div id="itemModalAlert"></div>
        <form id="itemForm">
          <div class="market-modal-grid">
            <div class="form-group">
              <label class="form-label" for="itemNameInput">Mahsulot nomi</label>
              <input class="form-control" id="itemNameInput" type="text" placeholder="Masalan: Premium daftar">
            </div>
            <div class="form-group">
              <label class="form-label" for="itemCategoryInput">Kategoriya</label>
              <select class="form-control" id="itemCategoryInput"></select>
            </div>
            <div class="form-group">
              <label class="form-label" for="itemPriceInput">Narx</label>
              <input class="form-control" id="itemPriceInput" type="number" min="1" step="1" placeholder="100">
            </div>
            <div class="form-group">
              <label class="form-label" for="itemStockInput">Stock</label>
              <input class="form-control" id="itemStockInput" type="number" min="0" step="1" placeholder="10">
            </div>
            <div class="form-group full-span">
              <label class="form-label" for="itemDescriptionInput">Tavsif</label>
              <textarea class="form-control" id="itemDescriptionInput" rows="4" placeholder="Mahsulot haqida qisqacha izoh"></textarea>
            </div>
            <div class="form-group full-span">
              <label class="form-label" for="itemVisualInput">Emoji yoki matnli belgi</label>
              <div class="market-upload">
                <input class="form-control" id="itemVisualInput" type="text" placeholder="Masalan: Notebook yoki emoji">
                <div class="market-upload__controls">
                  <label class="btn btn-secondary btn-sm" for="itemImageInput">Rasm yuklash</label>
                  <input id="itemImageInput" type="file" accept="image/*" hidden>
                  <button class="btn btn-ghost btn-sm" type="button" id="removeItemImageBtn">Rasmni olib tashlash</button>
                  <div class="market-upload__preview" id="itemPreview" hidden>
                    <div id="itemPreviewMedia"></div>
                  </div>
                </div>
              </div>
            </div>
            <div class="form-group full-span">
              <label class="form-label" for="itemActiveInput">Holat</label>
              <label style="display:flex;align-items:center;gap:10px;">
                <input id="itemActiveInput" type="checkbox" checked>
                <span>Mahsulot faol bo'lsin</span>
              </label>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" type="button" id="cancelItemModalBtn">Bekor</button>
        <button class="btn btn-primary" type="submit" form="itemForm" id="itemSubmitBtn">Saqlash</button>
      </div>
    </div>
  </div>

  <script src="../../js/auth.js"></script>
  <script src="../../js/main.js"></script>
  <script src="../../js/shop-management-page.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      initShopManagementPage({
        allowedRoles: ['manager'],
        topbarTitle: "Do'kon boshqaruvi",
        heroTitle: "Manager shop paneli",
        heroSubtitle: "Mahsulotlarni tez boshqaring, stockni kuzating va katalogni yangilang.",
      });
    });
  </script>
</body>
</html>

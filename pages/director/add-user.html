<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="EduCoin — ta'lim mukofot tizimi">
  <meta name="theme-color" content="#050A05">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <title>EduCoin - Foydalanuvchi Qo'shish</title>
  <link rel="stylesheet" href="../../css/style.css">
  <link rel="stylesheet" href="../../css/dashboard.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="app-layout">
    <div id="sidebar-container"></div>
    <div class="main-content">
      <header class="topbar">
        <div class="topbar-left">
          <button class="hamburger" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
          <div class="topbar-title">👤 Foydalanuvchi Qo'shish</div>
        </div>
        <div class="topbar-right">
          <div class="coin-display" id="topCoinDisplay">🪙 0</div>
        </div>
      </header>
      <div class="page-content">
        <div class="page-header">
          <div>
            <h1>👤 Yangi Foydalanuvchi</h1>
            <p>Tizimga yangi foydalanuvchi yaratish</p>
          </div>
          <button class="btn btn-secondary" onclick="window.location.href='dashboard.html'">
            <i class="fas fa-arrow-left"></i>
            Orqaga
          </button>
        </div>

        <div class="card">
          <div class="card-header">
            <h3>👤 Yangi Foydalanuvchi</h3>
          </div>
          <div class="card-body">
            <div id="userAlert"></div>
            
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">Ism</label>
                <input type="text" class="form-control" id="userName" placeholder="Foydalanuvchi ismi">
              </div>
              <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" class="form-control" id="userUsername" placeholder="Login uchun username">
              </div>
            </div>

            <div class="form-group">
              <label class="form-label">Parol</label>
              <input type="password" class="form-control" id="userPassword" placeholder="Xavfsiz parol">
            </div>

            <div class="form-group">
              <label class="form-label">Rol</label>
              <select class="form-control" id="userRole">
                <option value="student">O'quvchi</option>
                <option value="teacher">O'qituvchi</option>
                <option value="manager">Menejer</option>
                <option value="director">Direktor</option>
              </select>
            </div>

          <div class="card">
            <h3 style="margin-bottom:16px">👥 So'nggi qo'shilgan foydalanuvchilar</h3>
            <div id="recentUsers"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="../../js/auth.js"></script>
  <script src="../../js/main.js"></script>
  <script>
    let currentUser;
    document.addEventListener('DOMContentLoaded', async () => {
      await EduCoin.init();
      currentUser = EduCoin.requireAuth(['manager','director','admin']);
      if (!currentUser) return;
      document.getElementById('sidebar-container').innerHTML = buildSidebar(currentUser.role, currentUser);
      document.getElementById('topCoinDisplay').textContent = `🪙 ${(currentUser.coins||0).toLocaleString()}`;
      const groups = EduCoin.getGroups();
      const sel = document.getElementById('groupId');
      groups.forEach(g => {
        const o = document.createElement('option'); o.value=g.id; o.textContent=g.name; sel.appendChild(o);
      });
      renderRecent();
    });

    function onRoleChange() {
      const role = document.getElementById('role').value;
      document.getElementById('groupField').style.display = role==='student' ? 'block' : 'none';
    }

    function addUser() {
      const name = document.getElementById('fullName').value.trim();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const email = document.getElementById('email').value.trim();
      const role = document.getElementById('role').value;
      const groupId = document.getElementById('groupId').value;
      const el = document.getElementById('formAlert');

      if (!name) { el.innerHTML='<div class="alert alert-danger">Ism kiriting!</div>'; return; }
      if (!username) { el.innerHTML='<div class="alert alert-danger">Username kiriting!</div>'; return; }
      if (password.length < 4) { el.innerHTML='<div class="alert alert-danger">Parol kamida 4 ta belgi!</div>'; return; }

      const exists = EduCoin.getUsers().find(u=>u.username===username);
      if (exists) { el.innerHTML='<div class="alert alert-danger">Bu username band!</div>'; return; }

      const userData = { name, username, password, email, role };
      if (role==='student' && groupId) {
        userData.groupId = groupId;
        const groups = EduCoin.getGroups();
        const gIdx = groups.findIndex(g=>g.id===groupId);
        if (gIdx !== -1) { groups[gIdx].studentIds.push('TEMP'); EduCoin.setData('groups', groups); }
      }

      const newUser = EduCoin.addUser(userData);

      if (role==='student' && groupId) {
        const groups = EduCoin.getGroups();
        const gIdx = groups.findIndex(g=>g.id===groupId);
        if (gIdx !== -1) {
          groups[gIdx].studentIds = groups[gIdx].studentIds.filter(id=>id!=='TEMP');
          groups[gIdx].studentIds.push(newUser.id);
          EduCoin.setData('groups', groups);
        }
      }

      el.innerHTML='<div class="alert alert-success">✅ Foydalanuvchi muvaffaqiyatli qo\'shildi!</div>';
      document.getElementById('fullName').value='';
      document.getElementById('username').value='';
      document.getElementById('password').value='';
      document.getElementById('email').value='';
      renderRecent();
      showToast(`${name} tizimga qo'shildi!`, 'success');
      setTimeout(()=>el.innerHTML='',4000);
    }

    function renderRecent() {
      const users = EduCoin.getUsers().slice(-6).reverse();
      const roleLabels={student:"O'quvchi",teacher:"O'qituvchi",manager:"Menejer",director:"Direktor",admin:"Admin"};
      const roleColors={student:'#4CAF50',teacher:'#2196F3',manager:'#FF9800',director:'#9C27B0',admin:'#F44336'};
      document.getElementById('recentUsers').innerHTML = users.map(u=>`
        <div class="user-card" style="margin-bottom:10px">
          <div class="user-card-avatar">${getInitials(u.name)}</div>
          <div class="user-card-info">
            <div class="user-card-name">${u.name}</div>
            <div style="display:flex;align-items:center;gap:8px;margin-top:4px">
              <span class="badge" style="background:${roleColors[u.role]}22;color:${roleColors[u.role]}">${roleLabels[u.role]}</span>
              <span style="font-size:12px;color:var(--text3)">${u.username}</span>
            </div>
          </div>
          <div class="user-card-coins">${(u.coins||0).toLocaleString()} 🪙</div>
        </div>
      `).join('');
    }
  </script>
</body>
</html>

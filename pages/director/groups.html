<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="EduCoin — ta'lim mukofot tizimi">
  <meta name="theme-color" content="#050A05">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <title>EduCoin — Guruhlar</title>
  <link rel="stylesheet" href="../../css/style.css">
  <link rel="stylesheet" href="../../css/dashboard.css">
</head>
<body>
  <div class="app-layout">
    <div id="sidebar-container"></div>
    <div class="main-content">
      <header class="topbar">
        <div style="display:flex;align-items:center;gap:12px">
          <button class="hamburger" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
          <div class="topbar-title">👥 Guruhlar</div>
        </div>
        <div class="topbar-right">
          <div class="coin-display" id="topCoinDisplay">🪙 0</div>
        </div>
      </header>
      <div class="page-content">
        <div class="page-header">
          <div><h1>👥 Mening guruhlarim</h1><p>O'quvchilar ro'yxati va coin berish</p></div>
        </div>
        <div id="groupsContainer"></div>
      </div>
    </div>
  </div>

  <!-- Award Modal -->
  <div class="modal-overlay" id="awardModal">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">🎁 Coin berish</div>
        <button class="modal-close" onclick="closeModal('awardModal')">×</button>
      </div>
      <div class="modal-body">
        <div id="awardAlert"></div>
        <div class="award-target-info">
          <div class="award-target-label">O'quvchi</div>
          <div id="awardTargetName" class="award-target-name">—</div>
        </div>
        <div class="form-group">
          <label class="form-label">Coin miqdori</label>
          <input type="number" class="form-control" id="awardAmount" placeholder="Masalan: 50" min="1">
        </div>
        <div class="form-group">
          <label class="form-label">Sabab</label>
          <input type="text" class="form-control" id="awardReason" placeholder="Nima uchun?">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('awardModal')">Bekor</button>
        <button class="btn btn-primary" onclick="giveCoins()">🎁 Berish</button>
      </div>
    </div>
  </div>

  <script src="../../js/auth.js"></script>
  <script src="../../js/main.js"></script>
  <script>
    let currentUser, selectedStudentId;
    document.addEventListener('DOMContentLoaded', async () => {
      await EduCoin.init();
      currentUser = EduCoin.requireAuth(['teacher']);
      if (!currentUser) return;
      document.getElementById('sidebar-container').innerHTML = buildSidebar('teacher', currentUser);
      document.getElementById('topCoinDisplay').textContent = `🪙 ${(currentUser.coins||0).toLocaleString()}`;
      renderGroups();
    });

    function renderGroups() {
      const groups = EduCoin.getTeacherGroups(currentUser.id);
      const el = document.getElementById('groupsContainer');
      if (!groups.length) {
        el.innerHTML = '<div class="card"><div class="empty-state"><div class="icon">👥</div><p>Sizga hali guruh tayinlanmagan</p></div></div>';
        return;
      }
      el.innerHTML = groups.map(g => {
        const students = g.studentIds.map(id => EduCoin.getUserById(id)).filter(Boolean);
        return `<div class="card group-card">
          <div class="group-header">
            <div>
              <div class="group-name">📚 ${g.name}</div>
              <div class="group-meta">📅 ${g.schedule||'—'} &nbsp;•&nbsp; 📊 ${g.level||'—'}</div>
            </div>
            <span class="badge badge-primary">${students.length} o'quvchi</span>
          </div>
          <div class="divider"></div>
          ${students.length === 0 ? '<div class="empty-state"><p>Bu guruhda o\'quvchi yo\'q</p></div>' :
          `<div class="table-wrap"><table>
            <thead><tr><th>#</th><th>Ism</th><th>Username</th><th>Balans</th><th>Amal</th></tr></thead>
            <tbody>
              ${students.map((s,i) => `<tr>
                <td class="table-index">${i+1}</td>
                <td><div class="user-avatar-cell">
                  <div class="user-avatar-small">${getInitials(s.name)}</div>
                  <span class="student-name">${s.name}</span>
                </div></td>
                <td class="username-cell">${s.username}</td>
                <td class="coins-cell">${(s.coins||0).toLocaleString()} 🪙</td>
                <td><button class="btn btn-success btn-sm" onclick="openAward('${s.id}','${s.name}')">🎁 Coin ber</button></td>
              </tr>`).join('')}
            </tbody>
          </table></div>`}
        </div>`;
      }).join('');
    }

    function openAward(studentId, name) {
      selectedStudentId = studentId;
      document.getElementById('awardTargetName').textContent = name;
      document.getElementById('awardAmount').value = '';
      document.getElementById('awardReason').value = '';
      document.getElementById('awardAlert').innerHTML = '';
      openModal('awardModal');
    }

    function giveCoins() {
      const amount = parseInt(document.getElementById('awardAmount').value);
      const reason = document.getElementById('awardReason').value || 'Mukofot';
      const el = document.getElementById('awardAlert');
      if (!amount||amount<1) { el.innerHTML='<div class="alert alert-danger">Miqdor kiriting!</div>'; return; }
      const result = EduCoin.awardCoins(currentUser.id, selectedStudentId, amount, reason);
      if (result.success) {
        closeModal('awardModal');
        showToast('✅ Coin muvaffaqiyatli berildi!', 'success');
        renderGroups();
      } else {
        el.innerHTML=`<div class="alert alert-danger">${result.msg}</div>`;
      }
    }
  </script>
</body>
</html>

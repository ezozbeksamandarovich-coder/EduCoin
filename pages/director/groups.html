<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="EduCoin guruhlar boshqaruvi">
  <meta name="theme-color" content="#050A05">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <title>EduCoin - Guruhlar</title>
  <link rel="stylesheet" href="../../css/style.css">
  <link rel="stylesheet" href="../../css/dashboard.css">
</head>
<body>
  <div class="app-layout">
    <div id="sidebar-container"></div>
    <div class="main-content">
      <header class="topbar">
        <div style="display:flex;align-items:center;gap:12px;">
          <button class="hamburger" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
          <div>
            <div class="topbar-title">Guruhlar</div>
            <div style="font-size:12px;color:var(--text3);">Barcha guruhlar va tarkib nazorati</div>
          </div>
        </div>
        <div class="topbar-right">
          <div class="coin-display" id="topCoinDisplay">0 coin</div>
        </div>
      </header>
      <div class="page-content">
        <div class="page-header">
          <div>
            <h1>Barcha guruhlar</h1>
            <p>O'qituvchi, o'quvchi soni va jadvalni bir joyda ko'ring.</p>
          </div>
        </div>
        <div id="groupsContainer"></div>
      </div>
    </div>
  </div>

  <script src="../../js/auth.js"></script>
  <script src="../../js/main.js"></script>
  <script>
    let currentUser;

    document.addEventListener('DOMContentLoaded', async () => {
      await EduCoin.init();
      currentUser = EduCoin.requireAuth(['manager', 'director', 'admin']);
      if (!currentUser) return;

      document.getElementById('sidebar-container').innerHTML = buildSidebar(currentUser.role, currentUser);
      document.getElementById('topCoinDisplay').textContent = EduCoin.formatCoins(currentUser.coins || 0);
      renderGroups();
    });

    function renderGroups() {
      const groups = EduCoin.getGroups();
      const host = document.getElementById('groupsContainer');

      if (!groups.length) {
        host.innerHTML = '<div class="card"><div class="empty-state"><div class="icon">?</div><p>Hali guruhlar yaratilmagan.</p></div></div>';
        return;
      }

      host.innerHTML = groups.map((group) => {
        const teacher = group.teacherId ? EduCoin.getUserById(group.teacherId) : null;
        const students = (group.studentIds || []).map((id) => EduCoin.getUserById(id)).filter(Boolean);

        return `
          <div class="card" style="margin-bottom:18px;">
            <div style="display:flex;justify-content:space-between;gap:16px;align-items:flex-start;flex-wrap:wrap;">
              <div>
                <h3 style="margin-bottom:6px;">${group.name}</h3>
                <div style="font-size:13px;color:var(--text3);">
                  O'qituvchi: ${teacher ? teacher.name : 'Biriktirilmagan'}
                </div>
                <div style="font-size:13px;color:var(--text3);margin-top:4px;">
                  Jadval: ${group.schedule || 'Kiritilmagan'} | Daraja: ${group.level || 'Kiritilmagan'}
                </div>
              </div>
              <span class="badge badge-primary">${students.length} o'quvchi</span>
            </div>
            <div class="divider"></div>
            ${
              students.length
                ? `
                  <div class="table-wrap">
                    <table>
                      <thead>
                        <tr><th>#</th><th>Ism</th><th>Username</th><th>Balans</th></tr>
                      </thead>
                      <tbody>
                        ${students.map((student, index) => `
                          <tr>
                            <td>${index + 1}</td>
                            <td>${student.name}</td>
                            <td>${student.username}</td>
                            <td>${(student.coins || 0).toLocaleString()} coin</td>
                          </tr>
                        `).join('')}
                      </tbody>
                    </table>
                  </div>
                `
                : '<div class="empty-state"><p>Bu guruhda hali o\'quvchi yo\'q.</p></div>'
            }
          </div>
        `;
      }).join('');
    }
  </script>
</body>
</html>
